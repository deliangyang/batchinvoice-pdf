name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build binaries (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: batchinvoice-pdf-linux-amd64
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact: batchinvoice-pdf-windows-amd64.exe
          - os: macos-latest
            goos: darwin
            goarch: amd64
            artifact: batchinvoice-pdf-macos-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install Linux OpenGL dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xorg-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libxi-dev

      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p build
          VERSION="${GITHUB_REF_NAME}"
          BUILD_TIME="$(date -u '+%Y-%m-%d_%H:%M:%S')"
          GIT_COMMIT="${GITHUB_SHA}"
          LDFLAGS="-s -w -X main.Version=${VERSION} -X main.BuildTime=${BUILD_TIME} -X main.GitCommit=${GIT_COMMIT}"
          OUT="build/${{ matrix.artifact }}"
          echo "Building for $GOOS/$GOARCH -> $OUT"
          go build -v -ldflags "$LDFLAGS" -o "$OUT" main.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List downloaded files
        run: ls -R dist

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

